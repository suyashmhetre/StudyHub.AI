<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StudyHub AI — collaborate, share and study smarter." />
    <title>StudyHub AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
html,
/* ===== Startup Loader ===== */

#startup-loader{
    position:fixed;
    inset:0;
    z-index:999999;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    background:
        radial-gradient(circle at 20% 20%,rgba(123,92,255,.25),transparent 35%),
        radial-gradient(circle at 80% 80%,rgba(0,229,255,.18),transparent 40%),
        linear-gradient(135deg,#090b1b,#13162f,#0c1024);

    color:white;
}

/* floating background */

#startup-loader::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    border-radius:50%;
    background:radial-gradient(circle,#7c5cff55,transparent 70%);
    filter:blur(40px);
    animation:floatBlob 8s ease-in-out infinite;
}

#startup-loader::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;
    background:radial-gradient(circle,#00d9ff30,transparent 70%);
    right:-100px;
    bottom:-100px;
    filter:blur(50px);
    animation:floatBlob2 9s ease-in-out infinite;
}

.loader-logo{
    width:88px;
    height:88px;

    display:flex;
    justify-content:center;
    align-items:center;

    border-radius:24px;

    background:linear-gradient(135deg,#7c5cff,#5b3fff);

    font-size:38px;
    font-weight:bold;

    box-shadow:
        0 0 45px rgba(124,92,255,.45),
        inset 0 0 15px rgba(255,255,255,.18);

    animation:pulse 2s infinite;
}

.loader-rings{
    position:relative;
    width:120px;
    height:120px;
    margin-top:-104px;
    margin-bottom:40px;
}

.loader-rings span{
    position:absolute;
    inset:0;

    border-radius:50%;
    border:2px solid rgba(255,255,255,.12);

    animation:ripple 2.4s infinite;
}

.loader-rings span:nth-child(2){
    animation-delay:.6s;
}

.loader-rings span:nth-child(3){
    animation-delay:1.2s;
}

#startup-loader h2{
    margin-top:15px;
    margin-bottom:10px;

    font-size:34px;
    font-weight:700;

    letter-spacing:-1px;
}

#startup-loader p{
    color:#bfc7df;
    font-size:16px;
    letter-spacing:.5px;
}

@keyframes pulse{

    0%{
        transform:scale(.95);
        box-shadow:0 0 20px rgba(124,92,255,.3);
    }

    50%{
        transform:scale(1.04);
        box-shadow:0 0 55px rgba(124,92,255,.65);
    }

    100%{
        transform:scale(.95);
        box-shadow:0 0 20px rgba(124,92,255,.3);
    }

}

@keyframes ripple{

    from{
        transform:scale(.5);
        opacity:1;
    }

    to{
        transform:scale(1.8);
        opacity:0;
    }

}

@keyframes floatBlob{

    0%,100%{
        transform:translate(-70px,-30px);
    }

    50%{
        transform:translate(40px,50px);
    }

}

@keyframes floatBlob2{

    0%,100%{
        transform:translate(0,0);
    }

    50%{
        transform:translate(-80px,-60px);
    }

}
</style>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/modern.css" />
  </head>
  <body>
<div id="startup-loader">
    <div class="loader-logo">
        ✦
    </div>

    <div class="loader-rings">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <h2>StudyHub AI</h2>
    <p>Preparing your workspace...</p>
</div>

    <div id="app" aria-live="polite"></div>
    <div id="toast-region" class="toast-region" aria-live="assertive"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
