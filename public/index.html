<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="StudyHub AI — collaborate, share and study smarter." />
    <title>StudyHub AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <style>
html,
body{
    margin:0;
    width:100%;
    height:100%;
    background:#0f1226;
}

#startup-loader{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:18px;
    background:#0f1226;
    color:white;
    z-index:99999;
}

#startup-loader .logo{
    width:70px;
    height:70px;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    background:linear-gradient(135deg,#6d5efc,#8b5cf6);
}

#startup-loader .spinner{
    width:42px;
    height:42px;
    border:4px solid rgba(255,255,255,.15);
    border-top-color:#8b5cf6;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}
</style>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/modern.css" />
  </head>
  <body>
    <div id="startup-loader">
    <div class="logo">✨</div>
    <div class="spinner"></div>
    <p>Loading StudyHub AI...</p>
</div>

    <div id="app" aria-live="polite"></div>
    <div id="toast-region" class="toast-region" aria-live="assertive"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
